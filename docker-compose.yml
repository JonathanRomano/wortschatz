# Wortschatz API + Postgres — Hetzner VPS deployment.
#
# Only the API and its Postgres run here; the web app stays on Vercel and
# reaches this API over the public PORT (4000) using the shared
# INTERNAL_API_SECRET. (For a LOCAL dev Postgres only, use
# docker-compose.dev.yml instead.)
#
# Setup on the server: copy .env.production.example → .env and fill it in, then:
#   docker compose up -d --build      # build + start
#   docker compose logs -f api        # follow API logs (incl. migrations)
#   docker compose down               # stop (keeps the postgres-data volume)

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - wortschatz-net
    # No `ports:` — Postgres is reachable only from the `api` service over the
    # internal network, never from the internet.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      # Composed from the POSTGRES_* values; host is the `postgres` service.
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      # Shared with apps/web (Vercel) — must match exactly. Min 32 chars.
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      # Public URL of the web app — used for CORS in Express.
      WEB_URL: ${WEB_URL}
      # AI providers.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      # Optional LLM-call logging (helicone.ai).
      HELICONE_API_KEY: ${HELICONE_API_KEY:-}
    ports:
      - "4000:4000"
    networks:
      - wortschatz-net

volumes:
  postgres-data:

networks:
  wortschatz-net:
    driver: bridge
